# Enable Colours
set -g default-terminal 'xterm-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -as terminal-overrides ',alacritty*:Tc:sitm=\E[3m'

# Prefix Key
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Window and pane index start at 1
set -g base-index 1
set -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Attach to another session instead of detaching when last window closes
set -g detach-on-destroy off

# Better clipboard integration on Wayland
set -g set-clipboard on

# Open new windows in current directory path
bind c new-window -c "#{pane_current_path}"

# Kill pane without confirmation
bind x kill-pane

# Quick switch between last two windows
bind Space last-window

# Break pane into its own window
bind b break-pane

# Split Windows
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload Config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 Config reloaded"

# Resize Panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Enable Mouse
set -g mouse on

# Scrollback
set -g history-limit 50000

# Status messages display time
set -g display-time 2000

# Status bar refresh interval
set -g status-interval 5

# VIM motions
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Enable Mouse Dragging
unbind -T copy-mode-vi MouseDragEnd1Pane

# Status Line Position
set-option -g status-position top

##### Plugins #####
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

##### Theme #####
set -g status-style bg='#1b1e37',fg='#e1e1e2'
set -g message-style bg='#030b1e',fg='#e2c779'
set -g pane-border-style fg='#696969'
set -g pane-active-border-style fg='#e2c779'
set -g mode-style bg='#e2c779',fg='#1b1e37'

set -g status-left-length 60
set -g status-left "#[fg=#e2c779,bg=#1b1e37]#[fg=#1b1e37,bg=#e2c779,bold] #S  #[fg=#e2c779,bg=#1b1e37]"

set -g status-right-length 120
set -g status-right "#[fg=#1b1e37]#[fg=#e1e1e2,bg=#1b1e37] 󰥔 %H:%M #[fg=#e1e1e2] #[fg=#696969]󰃭 %Y-%m-%d #[fg=#1b1e37]#[fg=#ff6b8a,bg=#1b1e37] 󰅒 #(whoami)@#H "

set -g window-status-format "#[fg=#696969] 󰈚 #I:#W "
set -g window-status-current-format "#[fg=#e1e1e2,bg=#030b1e,bold] 󰈚 #I:#W #[default]"
set -g window-status-separator ""

##### Auto Save / Restore #####
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

##### Neovim CheckHealth Recommendations #####
set-option -sg escape-time 10
set-option -g focus-events on

##### Pop-Up: Session List #####
bind w display-popup -E -b rounded -T " Sessions" -w 30% -h 50% ~/.config/tmux/scripts/tmux-menu.sh

##### Pop-Up: Scratch Pad #####
unbind -T popup Tab
bind T display-popup -E -w 80% -h 80% ~/.config/tmux/scripts/tmux-scratch.sh
bind -T popup t send-keys t
bind -T popup q send-keys q
bind -T popup T detach
bind -T popup C-[ copy-mode

##### Pop-Up: LazyGit #####
bind g display-popup -d "#{pane_current_path}" -E -b none -w 81% -h 80% lazygit

##### Pop-Up: SSH Menu #####
bind S display-popup -E -b none -w 40% -h 50% ~/.config/tmux/scripts/tmux-ssh.sh

##### TPM Init #####
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
run '~/.config/tmux/plugins/tpm/tpm'
